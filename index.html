<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made SMPL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
    h1{font-size:72px;font-weight:600;letter-spacing:-3px;margin-bottom:24px}
    .tagline{font-size:18px;color:rgba(255,255,255,0.5);margin-bottom:60px}
    .label{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin-bottom:24px}
    .icon{font-size:32px;margin-bottom:16px}
    .product{font-size:16px;color:#8B2942;font-weight:500;margin-bottom:16px}
    .cta{background:#8B2942;color:#fff;padding:14px 28px;border-radius:28px;text-decoration:none;font-weight:500}
    .coming{margin-top:48px}
    .coming-items{display:flex;gap:32px;color:rgba(255,255,255,0.3);font-size:14px;margin-top:16px}
    footer{position:absolute;bottom:24px;font-size:12px;color:rgba(255,255,255,0.2)}
  </style>
</head>
<body>
  <h1>Made SMPL</h1>
  <p class="tagline">Life's too short for complicated choices.</p>
  <div class="label">NOW LIVE</div>
  <div class="icon">🍷</div>
  <div class="product">Wine Made SMPL</div>
  <a href="https://wine.madesmpl.com" class="cta">Try it free</a>
  <div class="coming">
    <div class="label">COMING SOON</div>
    <div class="coming-items"><span>Beer</span><span>Cocktails</span><span>Whiskey</span></div>
  </div>
  <footer>2026 Laidback Labs - Ho Chi Minh City</footer>
</body>
</html>
