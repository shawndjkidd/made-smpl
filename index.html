<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made SMPL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #8B2942; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .brand { font-size: 64px; font-weight: 600; letter-spacing: -2px; margin-bottom: 16px; color: #1d1d1f; }
    .tagline { font-size: 18px; color: #86868b; margin-bottom: 80px; }
    .product-section { margin-bottom: 80px; }
    .product-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; color: #86868b; margin-bottom: 20px; text-transform: uppercase; }
    .product-name { font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
    .product-desc { font-size: 15px; color: #86868b; margin-bottom: 24px; }
    .cta { display: inline-block; background: var(--accent); color: white; padding: 14px 28px; border-radius: 980px; font-size: 15px; font-weight: 500; text-decoration: none; transition: opacity 0.2s; }
    .cta:hover { opacity: 0.85; }
    .coming-section { border-top: 1px solid #d2d2d7; padding-top: 40px; }
    .coming-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; color: #86868b; margin-bottom: 20px; text-transform: uppercase; }
    .coming-items { display: flex; gap: 40px; font-size: 15px; color: #86868b; }
    footer { padding: 20px; text-align: center; font-size: 12px; color: #86868b; }
    @media (max-width: 480px) { .brand { font-size: 48px; } .coming-items { gap: 24px; font-size: 14px; } }
  </style>
</head>
<body>
  <main>
    <div class="brand">Made SMPL</div>
    <p class="tagline">Life's too short for complicated choices.</p>
    <div class="product-section">
      <div class="product-label">Now Live</div>
      <div class="product-name">Wine Made SMPL</div>
      <p class="product-desc">Scan any wine. Get instant answers.</p>
      <a href="https://wine.madesmpl.com" class="cta">Try it free</a>
    </div>
    <div class="coming-section">
      <div class="coming-label">Coming Soon</div>
      <div class="coming-items">
        <span>Beer</span>
        <span>Cocktails</span>
        <span>Whiskey</span>
      </div>
    </div>
  </main>
  <footer>© 2026 Laidback Labs · Ho Chi Minh City</footer>
</body>
</html>
